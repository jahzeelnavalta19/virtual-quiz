<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>👥 Group Game - Host</title>
<link rel="stylesheet" href="style.css">
<style>
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:100;}
.popup-box{background:#16213e;border-radius:24px;padding:40px;text-align:center;max-width:450px;width:90%;border:2px solid #00b894;box-shadow:0 0 50px rgba(0,184,148,0.3);}
.popup-box h2{color:#ffd700;margin-bottom:20px;}
.popup-box select,.popup-box input{width:100%;padding:14px;font-size:1.1em;border-radius:50px;background:#0a0a1a;color:white;border:2px solid #00b894;text-align:center;margin:10px 0;}
</style>
</head>
<body>
<canvas class="particles" id="particles"></canvas>

<!-- SETUP POPUP -->
<div class="popup-overlay" id="setup-popup">
<div class="popup-box">
<h2>👥 Group Game Setup</h2>
<p style="color:#aaa;margin-bottom:10px;">Select Section</p>
<select id="group-section-select">
<option value="11-TAURUS">11-TAURUS</option><option value="11-GEMINI">11-GEMINI</option><option value="11-AQUILA">11-AQUILA</option><option value="11-PISCES">11-PISCES</option><option value="11-ARIES">11-ARIES</option><option value="11-SCORPIUS">11-SCORPIUS</option><option value="12-PYTHAGORAS">12-PYTHAGORAS</option><option value="11-AQUARIUS">11-AQUARIUS</option>
</select>
<p style="color:#aaa;margin:15px 0;">Number of Groups</p>
<select id="group-count-select">
<option value="3">3 Groups</option><option value="4" selected>4 Groups</option><option value="5">5 Groups</option><option value="6">6 Groups</option><option value="7">7 Groups</option><option value="8">8 Groups</option><option value="9">9 Groups</option><option value="10">10 Groups</option>
</select>
<p style="color:#aaa;margin:15px 0;">Choose Subject:</p>
<button class="btn btn-primary" onclick="startGroupGame('mil')" style="background:#e94560;display:block;width:100%;margin:8px 0;">📚 Media and Information Literacy 12</button>
<button class="btn btn-primary" onclick="startGroupGame('ec')" style="background:#0f3460;display:block;width:100%;margin:8px 0;">📝 Effective Communication 11</button>
</div>
</div>

<div class="container">
<div id="lobby-screen"><h1>👥 Group Game</h1><h2>Host Screen</h2>
<div class="glass-card pin-display"><div class="pin-label">Game PIN</div><div class="pin-number" id="game-pin">----</div><p style="font-size:1.5em;color:#ffd700;word-break:break-all;margin:15px 0;" id="big-url"></p><p style="color:#aaa;font-size:0.85em;">📱 Students type this URL in their browser</p></div>
<div class="glass-card"><h3 style="color:#00b894;">👥 Groups</h3><div id="group-list"><p style="color:#aaa;">Waiting for players...</p></div></div><button class="btn btn-success" id="start-btn" onclick="startGame()" disabled>🚀 Start Game</button></div>
<div id="countdown-screen" style="display:none;"><div class="countdown" id="countdown-number">3</div><p style="font-size:1.6em;color:#aaa;">Get ready...</p></div>
<div id="question-screen" style="display:none;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="color:#aaa;font-weight:700;">Question <span id="q-current">1</span> / 30</div><div style="color:#ffd700;font-size:0.9em;background:rgba(255,215,0,0.1);padding:5px 15px;border-radius:20px;">PIN: <strong id="game-pin-display">----</strong></div></div><div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%;"></div></div><div class="timer-text" id="timer-text">20</div><div class="glass-card"><div class="question-text" id="question-text"></div><div class="answers-grid" id="answers-grid"></div></div><div id="double-points-section" style="margin-top:15px;"><button class="btn btn-warning" id="double-btn" onclick="activateDoublePoints()" style="font-size:1em;">🔥 DOUBLE POINTS!</button></div></div>
<div id="leaderboard-screen" style="display:none;"><h2>🏆 Group Rankings</h2><div class="glass-card"><div class="leaderboard" id="leaderboard-list"></div></div><button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;">▶ Next Question</button></div>
<div id="gameover-screen" style="display:none;"><h1>🏆 Game Over!</h1><h2>Final Group Standings</h2><div class="glass-card"><div class="leaderboard" id="final-leaderboard"></div></div></div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const pts=[];for(let i=0;i<40;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,speed:Math.random()*0.5+0.2,opacity:Math.random()*0.4+0.1});function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.y-=p.speed;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.fill();});requestAnimationFrame(anim);}anim();
const AudioContext=window.AudioContext||window.webkitAudioContext;let audioCtx;function initAudio(){if(!audioCtx)audioCtx=new AudioContext();}function playBeep(f,d,t='sine',v=0.3){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}function playTick(){playBeep(800,0.15,'square',0.2);}function playGo(){playBeep(1200,0.5,'square',0.4);}function playQStart(){playBeep(523,0.1);setTimeout(()=>playBeep(659,0.1),100);setTimeout(()=>playBeep(784,0.2),200);}function playTimesUp(){playBeep(200,0.5,'sawtooth',0.3);}function playReveal(){playBeep(600,0.1);setTimeout(()=>playBeep(800,0.1),150);setTimeout(()=>playBeep(1000,0.2),300);}function playDouble(){playBeep(880,0.15,'square',0.4);setTimeout(()=>playBeep(1100,0.2,'square',0.5),150);}
const socket=io();let gamePIN='',timerInterval=null,timeLeft=0;
function startGroupGame(s){document.getElementById('setup-popup').style.display='none';const sec=document.getElementById('group-section-select').value;const num=parseInt(document.getElementById('group-count-select').value);socket.emit('group-create',{subject:s,section:sec,numGroups:num});}
socket.on('group-created',(d)=>{gamePIN=d.pin;document.getElementById('game-pin').textContent=gamePIN;document.getElementById('game-pin-display').textContent=gamePIN;document.getElementById('big-url').textContent='https://virtual-quiz.onrender.com/group-player.html';updateGroupList(d.groups,d.numGroups);});
socket.on('group-player-joined',(d)=>{updateGroupList(d.groups,d.numGroups);document.getElementById('start-btn').disabled=false;});
function updateGroupList(groups,num){let html='';for(let i=1;i<=num;i++){const g=groups[i]||{name:'Group '+i,members:[]};const count=g.members?g.members.length:0;html+=`<div class="player-item"><span style="font-size:1.5em;font-weight:900;color:#00b894;">${g.name}</span><span style="flex:1;text-align:left;margin-left:15px;color:#aaa;">${count} member(s)</span></div>`;}document.getElementById('group-list').innerHTML=html;}
function startGame(){initAudio();socket.emit('group-start');}
function activateDoublePoints(){playDouble();socket.emit('group-double');const b=document.getElementById('double-btn');b.disabled=true;b.textContent='⚡ DOUBLE POINTS ACTIVE!';b.style.background='#ffd700';b.style.color='#1a1a2e';b.style.boxShadow='0 0 30px rgba(255,215,0,0.8)';}
socket.on('group-double-active',()=>{const b=document.getElementById('double-btn');if(b){b.disabled=true;b.textContent='⚡ DOUBLE POINTS ACTIVE!';b.style.background='#ffd700';b.style.color='#1a1a2e';b.style.boxShadow='0 0 30px rgba(255,215,0,0.8)';}});
socket.on('group-started',()=>{document.getElementById('lobby-screen').style.display='none';document.getElementById('countdown-screen').style.display='block';let c=3;const cd=document.getElementById('countdown-number');cd.textContent=c;const ci=setInterval(()=>{c--;if(c<=0){clearInterval(ci);playGo();document.getElementById('countdown-screen').style.display='none';document.getElementById('question-screen').style.display='block';playQStart();}else{playTick();cd.textContent=c;cd.style.animation='none';cd.offsetHeight;cd.style.animation='countPop 1s ease';}},1000);});
socket.on('group-question',(d)=>{document.getElementById('leaderboard-screen').style.display='none';document.getElementById('question-screen').style.display='block';document.getElementById('q-current').textContent=d.questionNumber;document.getElementById('question-text').textContent=d.questionText;const grid=document.getElementById('answers-grid'),cols=['#e94560','#0f3460','#533483','#00b894'];grid.innerHTML=d.answers.map((a,i)=>`<div class="answer-btn" style="background:linear-gradient(135deg,${cols[i]},${cols[i]}dd);">${a}</div>`).join('');const db=document.getElementById('double-btn');db.disabled=false;db.textContent='🔥 DOUBLE POINTS!';db.style.background='';db.style.color='';db.style.boxShadow='';timeLeft=20;document.getElementById('timer-text').textContent=timeLeft;document.getElementById('timer-fill').style.width='100%';clearInterval(timerInterval);timerInterval=setInterval(()=>{timeLeft--;document.getElementById('timer-text').textContent=timeLeft;document.getElementById('timer-fill').style.width=(timeLeft/20*100)+'%';if(timeLeft<=0){clearInterval(timerInterval);playTimesUp();}},1000);});
socket.on('group-results',(d)=>{clearInterval(timerInterval);playReveal();document.getElementById('question-screen').style.display='none';document.getElementById('leaderboard-screen').style.display='block';const lb=document.getElementById('leaderboard-list'),rc=['gold','silver','bronze'],em=['🥇','🥈','🥉'],nb=document.getElementById('next-btn');nb.style.display='none';lb.innerHTML='<div style="text-align:center;padding:30px;"><div style="font-size:4em;animation:countPulse 0.6s infinite;">🧮</div><p class="waiting-text">Calculating scores...</p></div>';setTimeout(()=>{lb.innerHTML=d.leaderboard.map((g,i)=>`<div class="leaderboard-item"><span class="leaderboard-rank ${rc[i]||''}">${em[i]||`#${i+1}`}</span><span class="leaderboard-name">${g.name}</span><span style="color:#aaa;font-size:0.8em;">${g.members} members</span><span class="leaderboard-score">${g.score} pts</span></div>`).join('');nb.style.display='inline-block';},2000);});
function nextQuestion(){document.getElementById('next-btn').style.display='none';socket.emit('group-next');}
socket.on('group-ended',(d)=>{document.getElementById('leaderboard-screen').style.display='none';document.getElementById('question-screen').style.display='none';document.getElementById('gameover-screen').style.display='block';const lb=document.getElementById('final-leaderboard'),rc=['gold','silver','bronze'],em=['🥇','🥈','🥉'];lb.innerHTML=d.leaderboard.map((g,i)=>`<div class="leaderboard-item"><span class="leaderboard-rank ${rc[i]||''}">${em[i]||`#${i+1}`}</span><span class="leaderboard-name">${g.name}</span><span style="color:#aaa;font-size:0.8em;">${g.members} members</span><span class="leaderboard-score">${g.score} pts</span></div>`).join('');});
</script>
</body>
</html>
