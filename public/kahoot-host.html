<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎮 Game Mode - Host</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
#qrcode canvas,#qrcode img{border-radius:20px;padding:12px;background:white;box-shadow:0 8px 30px rgba(0,0,0,0.3);}
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:100;}
.popup-box{background:#16213e;border-radius:24px;padding:40px;text-align:center;max-width:400px;width:90%;border:2px solid #e94560;box-shadow:0 0 50px rgba(233,69,96,0.3);}
.popup-box h2{color:#ffd700;margin-bottom:20px;}
.popup-box select{width:100%;padding:14px;font-size:1.1em;border-radius:50px;background:#0a0a1a;color:white;border:2px solid #e94560;text-align:center;margin:15px 0;}
</style>
</head>
<body>
<canvas class="particles" id="particles"></canvas>

<!-- SECTION POPUP -->
<div class="popup-overlay" id="section-popup">
<div class="popup-box">
<h2>📋 Select Section</h2>
<p style="color:#aaa;margin-bottom:10px;">Choose the class section for this game</p>
<select id="kahoot-section-select">
<option value="11-TAURUS">11-TAURUS</option>
<option value="11-GEMINI">11-GEMINI</option>
<option value="11-AQUILA">11-AQUILA</option>
<option value="11-PISCES">11-PISCES</option>
<option value="11-ARIES">11-ARIES</option>
<option value="11-SCORPIUS">11-SCORPIUS</option>
<option value="12-PYTHAGORAS">12-PYTHAGORAS</option>
<option value="11-AQUARIUS">11-AQUARIUS</option>
</select>
<p style="color:#aaa;margin:15px 0;">Then choose a subject:</p>
<button class="btn btn-primary" onclick="startWithSubject('mil')" style="background:#e94560;display:block;width:100%;margin:8px 0;">📚 Media and Information Literacy 12</button>
<button class="btn btn-primary" onclick="startWithSubject('ec')" style="background:#0f3460;display:block;width:100%;margin:8px 0;">📝 Effective Communication 11</button>
</div>
</div>

<div class="container">
<div id="lobby-screen"><h1>🎮 Game Mode</h1><h2>Host Screen</h2>
<div class="glass-card pin-display" id="pin-display" style="display:none;"><div class="pin-label">Game PIN</div><div class="pin-number" id="game-pin">----</div><div style="margin-top:12px;color:#aaa;">Join at: <span id="join-url" style="color:#ffd700;"></span></div><div id="qrcode" style="display:flex;justify-content:center;margin:15px 0;"></div><p style="color:#aaa;font-size:0.85em;">📱 Scan to join instantly!</p></div>
<div class="glass-card"><div class="player-list" id="player-list"><p style="color:#aaa;">Waiting for players...</p></div><p>Players: <strong><span id="player-count">0</span></strong></p></div><button class="btn btn-success" id="start-btn" onclick="startGame()" disabled>🚀 Start Game</button></div>
<div id="countdown-screen" style="display:none;"><div class="countdown" id="countdown-number">3</div><p style="font-size:1.6em;color:#aaa;">Get ready...</p></div>
<div id="question-screen" style="display:none;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="color:#aaa;font-weight:700;">Question <span id="q-current">1</span> / 30</div><div style="color:#ffd700;font-size:0.9em;background:rgba(255,215,0,0.1);padding:5px 15px;border-radius:20px;">PIN: <strong id="game-pin-display">----</strong></div></div><div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%;"></div></div><div class="timer-text" id="timer-text">20</div><div class="glass-card"><div class="question-text" id="question-text"></div><div class="answers-grid" id="answers-grid"></div></div><div id="double-points-section" style="margin-top:15px;"><button class="btn btn-warning" id="double-btn" onclick="activateDoublePoints()" style="font-size:1em;">🔥 DOUBLE POINTS!</button></div></div>
<div id="leaderboard-screen" style="display:none;"><h2>📊 Leaderboard</h2><div style="text-align:center;margin-bottom:10px;"><span style="color:#ffd700;font-size:0.9em;background:rgba(255,215,0,0.1);padding:5px 15px;border-radius:20px;">PIN: <strong id="game-pin-display2">----</strong></span></div><div class="glass-card"><div class="leaderboard" id="leaderboard-list"></div></div><button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;">▶ Next Question</button></div>
<div id="gameover-screen" style="display:none;"><h1>🏆 Game Over!</h1><h2>Final Standings</h2><div class="glass-card"><div class="leaderboard" id="final-leaderboard"></div></div></div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const pts=[];for(let i=0;i<40;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,speed:Math.random()*0.5+0.2,opacity:Math.random()*0.4+0.1});function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.y-=p.speed;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.fill();});requestAnimationFrame(anim);}anim();
const AudioContext=window.AudioContext||window.webkitAudioContext;let audioCtx;function initAudio(){if(!audioCtx)audioCtx=new AudioContext();}function playBeep(f,d,t='sine',v=0.3){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}function playTick(){playBeep(800,0.15,'square',0.2);}function playGo(){playBeep(1200,0.5,'square',0.4);}function playQStart(){playBeep(523,0.1);setTimeout(()=>playBeep(659,0.1),100);setTimeout(()=>playBeep(784,0.2),200);}function playTimesUp(){playBeep(200,0.5,'sawtooth',0.3);}function playReveal(){playBeep(600,0.1);setTimeout(()=>playBeep(800,0.1),150);setTimeout(()=>playBeep(1000,0.2),300);}function playDouble(){playBeep(880,0.15,'square',0.4);setTimeout(()=>playBeep(1100,0.2,'square',0.5),150);}
const socket=io();let gamePIN='',timerInterval=null,timeLeft=0;
function startWithSubject(s){document.getElementById('section-popup').style.display='none';document.getElementById('pin-display').style.display='block';const sec=document.getElementById('kahoot-section-select').value;socket.emit('kahoot-create',{subject:s,section:sec});}
socket.on('kahoot-created',(d)=>{gamePIN=d.pin;document.getElementById('game-pin').textContent=gamePIN;document.getElementById('game-pin-display').textContent=gamePIN;document.getElementById('game-pin-display2').textContent=gamePIN;const url='https://virtual-quiz.onrender.com/kahoot-player.html';document.getElementById('join-url').textContent=url;const q=document.getElementById('qrcode');q.innerHTML='';new QRCode(q,{text:url,width:180,height:180,colorDark:"#1a1a2e",colorLight:"#ffffff"});});
socket.on('kahoot-player-joined',(d)=>{updatePlayers(d.players);document.getElementById('player-count').textContent=d.count;document.getElementById('start-btn').disabled=d.count<1;});
socket.on('kahoot-player-left',(d)=>{updatePlayers(d.players);document.getElementById('player-count').textContent=d.count;document.getElementById('start-btn').disabled=d.count<1;});
function updatePlayers(pl){const l=document.getElementById('player-list');if(pl.length===0){l.innerHTML='<p style="color:#aaa;">Waiting for players...</p>';return;}const online=pl.filter(p=>p.online!==false),offline=pl.filter(p=>p.online===false);let html=pl.map(p=>{const isOffline=p.online===false;return`<div class="player-item" style="opacity:${isOffline?'0.4':'1'}"><span style="font-size:1.8em;">${p.character||'😊'}</span><span style="flex:1;text-align:left;margin-left:15px;font-weight:700;color:${p.color||'#fff'};">${p.nickname}${isOffline?' ⏳':''}</span></div>`;}).join('');if(offline.length>0){html+=`<p style="color:#e94560;font-size:0.85em;margin-top:5px;">⚠️ ${offline.length} player(s) disconnected — PIN: ${gamePIN}</p>`;}l.innerHTML=html;}
function startGame(){initAudio();socket.emit('kahoot-start');}
function activateDoublePoints(){playDouble();socket.emit('kahoot-double');const b=document.getElementById('double-btn');b.disabled=true;b.textContent='⚡ DOUBLE POINTS ACTIVE!';b.style.background='#ffd700';b.style.color='#1a1a2e';b.style.boxShadow='0 0 30px rgba(255,215,0,0.8)';}
socket.on('kahoot-double-active',()=>{const b=document.getElementById('double-btn');if(b){b.disabled=true;b.textContent='⚡ DOUBLE POINTS ACTIVE!';b.style.background='#ffd700';b.style.color='#1a1a2e';b.style.boxShadow='0 0 30px rgba(255,215,0,0.8)';}});
socket.on('kahoot-started',()=>{document.getElementById('lobby-screen').style.display='none';document.getElementById('countdown-screen').style.display='block';let c=3;const cd=document.getElementById('countdown-number');cd.textContent=c;const ci=setInterval(()=>{c--;if(c<=0){clearInterval(ci);playGo();document.getElementById('countdown-screen').style.display='none';document.getElementById('question-screen').style.display='block';playQStart();}else{playTick();cd.textContent=c;cd.style.animation='none';cd.offsetHeight;cd.style.animation='countPop 1s ease';}},1000);});
socket.on('kahoot-question',(d)=>{document.getElementById('leaderboard-screen').style.display='none';document.getElementById('question-screen').style.display='block';document.getElementById('q-current').textContent=d.questionNumber;document.getElementById('question-text').textContent=d.questionText;const grid=document.getElementById('answers-grid'),cols=['#e94560','#0f3460','#533483','#00b894'];grid.innerHTML=d.answers.map((a,i)=>`<div class="answer-btn" style="background:linear-gradient(135deg,${cols[i]},${cols[i]}dd);">${a}</div>`).join('');const db=document.getElementById('double-btn');db.disabled=false;db.textContent='🔥 DOUBLE POINTS!';db.style.background='';db.style.color='';db.style.boxShadow='';timeLeft=20;document.getElementById('timer-text').textContent=timeLeft;document.getElementById('timer-fill').style.width='100%';document.getElementById('timer-fill').classList.remove('urgent');document.getElementById('timer-text').classList.remove('urgent');clearInterval(timerInterval);timerInterval=setInterval(()=>{timeLeft--;document.getElementById('timer-text').textContent=timeLeft;document.getElementById('timer-fill').style.width=(timeLeft/20*100)+'%';if(timeLeft<=5){document.getElementById('timer-fill').classList.add('urgent');document.getElementById('timer-text').classList.add('urgent');}if(timeLeft<=0){clearInterval(timerInterval);playTimesUp();}},1000);});
socket.on('kahoot-results',(d)=>{clearInterval(timerInterval);playReveal();document.getElementById('question-screen').style.display='none';document.getElementById('leaderboard-screen').style.display='block';const lb=document.getElementById('leaderboard-list'),rc=['gold','silver','bronze'],nb=document.getElementById('next-btn');nb.style.display='none';lb.innerHTML=`<div style="text-align:center;padding:50px;"><div style="font-size:4em;animation:countPulse 0.6s infinite;">🧮</div><p class="waiting-text" style="font-size:1.6em;margin-top:15px;">Calculating scores...</p><div style="margin-top:20px;display:flex;justify-content:center;gap:8px;"><div style="width:12px;height:12px;background:#e94560;border-radius:50%;animation:bounceDot 1.2s infinite;"></div><div style="width:12px;height:12px;background:#ffd700;border-radius:50%;animation:bounceDot 1.2s infinite 0.2s;"></div><div style="width:12px;height:12px;background:#00b894;border-radius:50%;animation:bounceDot 1.2s infinite 0.4s;"></div></div></div>`;setTimeout(()=>{lb.innerHTML='';let prevRanks={};d.leaderboard.forEach((p,i)=>{prevRanks[p.nickname]=i;});d.leaderboard.forEach((p,i)=>{setTimeout(()=>{const oldRank=prevRanks[p.nickname]!==undefined?prevRanks[p.nickname]:i,rankChange=oldRank-i;const item=document.createElement('div');item.className='leaderboard-item';item.style.animation='none';let ch='';if(rankChange>0)ch=`<span style="color:#00b894;font-weight:900;font-size:1.2em;">▲${rankChange}</span>`;else if(rankChange<0)ch=`<span style="color:#e94560;font-weight:900;font-size:1.2em;">▼${Math.abs(rankChange)}</span>`;else if(i===0)ch='<span style="color:#ffd700;">👑</span>';const onlineStatus=p.online!==false?'🟢':'🔴';item.innerHTML=`<span class="leaderboard-rank ${rc[i]||''}">#${i+1}</span><span style="font-size:2em;margin:0 10px;">${p.character||'😊'}</span><span class="leaderboard-name" style="color:${p.color||'#fff'};">${p.nickname} <span style="font-size:0.6em;">${onlineStatus}</span></span><span style="margin:0 10px;">${ch}</span><span class="leaderboard-score">${p.score} pts</span>`;if(rankChange>0){item.style.background='rgba(0,255,136,0.1)';item.style.borderColor='rgba(0,255,136,0.5)';item.style.boxShadow='0 0 25px rgba(0,255,136,0.3)';setTimeout(()=>{item.style.background='';item.style.borderColor='';item.style.boxShadow='';},2500);}if(i===0){item.style.background='rgba(255,215,0,0.12)';item.style.borderColor='rgba(255,215,0,0.4)';item.style.boxShadow='0 0 30px rgba(255,215,0,0.3)';}item.offsetHeight;item.style.animation='slideInRight 0.6s ease';lb.appendChild(item);},i*900);});const dd=d.leaderboard.length*900+600;setTimeout(()=>{nb.style.display='inline-block';nb.style.animation='cardIn 0.5s ease';},dd);},2200);});
function nextQuestion(){document.getElementById('next-btn').style.display='none';socket.emit('kahoot-next');}
socket.on('kahoot-ended',(d)=>{document.getElementById('leaderboard-screen').style.display='none';document.getElementById('question-screen').style.display='none';document.getElementById('gameover-screen').style.display='block';const lb=document.getElementById('final-leaderboard'),rc=['gold','silver','bronze'],em=['🥇','🥈','🥉'];lb.innerHTML=d.leaderboard.map((p,i)=>{const onlineStatus=p.online!==false?'🟢':'🔴';return`<div class="leaderboard-item"><span class="leaderboard-rank ${rc[i]||''}">${em[i]||`#${i+1}`}</span><span style="font-size:2em;margin:0 10px;">${p.character||'😊'}</span><span class="leaderboard-name" style="color:${p.color||'#fff'};">${p.nickname} <span style="font-size:0.6em;">${onlineStatus}</span></span><span class="leaderboard-score">${p.score} pts</span></div>`}).join('');});
</script>
</body>
</html>
