<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>👥 Group Game</title>
<link rel="stylesheet" href="style.css">
<style>.answer-btn{width:100%;min-height:70px;font-size:1.15em;}@media(max-width:600px){.answers-grid{grid-template-columns:1fr;}}</style>
</head>
<body>
<canvas class="particles" id="particles"></canvas>
<div class="container">
<div id="join-screen"><h1>👥 Group Game</h1>
<div class="glass-card"><div class="input-group"><label style="display:block;margin-bottom:10px;color:#aaa;font-weight:700;">Game PIN</label><input type="text" id="pin-input" placeholder="____" maxlength="4" inputmode="numeric"></div><div class="input-group"><label style="display:block;margin-bottom:10px;color:#aaa;font-weight:700;">Your Group</label><select id="group-select" style="padding:14px;font-size:1.2em;border-radius:50px;background:#16213e;color:white;border:2px solid #00b894;width:200px;text-align:center;"><option value="1">Group 1</option><option value="2">Group 2</option><option value="3">Group 3</option><option value="4">Group 4</option></select></div><div id="join-error" style="color:#e94560;margin:10px 0;display:none;font-weight:700;"></div><button class="btn btn-success" onclick="joinGame()" style="font-size:1.3em;padding:20px 40px;">🎯 Join as Group!</button></div></div>
<div id="waiting-screen" style="display:none;"><div class="glass-card" style="text-align:center;"><h2>✅ Group Connected!</h2><p style="font-size:2.5em;font-weight:900;color:#00b894;" id="my-group"></p><p class="waiting-text">Waiting for host to start...</p><p style="color:#aaa;margin-top:15px;">👀 Discuss answers as a group!</p></div></div>
<div id="question-screen" style="display:none;"><div style="color:#aaa;margin-bottom:5px;font-weight:700;">Question <span id="q-current">1</span> / 30</div><div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%;"></div></div><div class="timer-text" id="timer-text">20</div><div class="glass-card"><div class="question-text" id="question-text" style="font-size:1.3em;margin-bottom:20px;"></div><div class="answers-grid" id="answers-grid"></div><div id="answer-feedback" style="margin-top:20px;"></div><div class="score-display">🏆 Group Score: <span id="group-score">0</span></div></div></div>
<div id="leaderboard-screen" style="display:none;"><h2>🏆 Group Rankings</h2><div class="glass-card"><div class="leaderboard" id="leaderboard-list"></div></div><p class="waiting-text">Waiting for next question...</p></div>
<div id="gameover-screen" style="display:none;"><h1>🏆 Game Over!</h1><div class="glass-card"><div class="leaderboard" id="final-leaderboard"></div></div></div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const pts=[];for(let i=0;i<30;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,speed:Math.random()*0.4+0.15,opacity:Math.random()*0.3+0.1});function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.y-=p.speed;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.fill();});requestAnimationFrame(anim);}anim();
const socket=io();let groupNum=0,timerInterval=null,answered=false;
function joinGame(){const pin=document.getElementById('pin-input').value.trim();const gnum=document.getElementById('group-select').value;if(!pin||pin.length!==4){document.getElementById('join-error').textContent='Enter a 4-digit PIN!';document.getElementById('join-error').style.display='block';return;}groupNum=parseInt(gnum);socket.emit('group-join',{pin,groupNum:gnum,studentNum:'0'});}
socket.on('group-join-success',(d)=>{document.getElementById('join-screen').style.display='none';document.getElementById('waiting-screen').style.display='block';document.getElementById('my-group').textContent='Group '+d.groupNum;});
socket.on('group-join-error',(d)=>{document.getElementById('join-error').textContent=d.message;document.getElementById('join-error').style.display='block';});
socket.on('group-double-active',()=>{document.getElementById('answer-feedback').innerHTML='<div class="feedback" style="color:#ffd700;font-size:1.8em;">⚡ DOUBLE POINTS! ⚡</div>';setTimeout(()=>{document.getElementById('answer-feedback').innerHTML='';},3000);});
socket.on('group-started',()=>{document.getElementById('waiting-screen').style.display='none';});
socket.on('group-question',(d)=>{answered=false;document.getElementById('leaderboard-screen').style.display='none';document.getElementById('gameover-screen').style.display='none';document.getElementById('question-screen').style.display='block';document.getElementById('q-current').textContent=d.questionNumber;document.getElementById('question-text').textContent=d.questionText;document.getElementById('answer-feedback').innerHTML='';const grid=document.getElementById('answers-grid'),cols=['#e94560','#0f3460','#533483','#00b894'];grid.innerHTML=d.answers.map((a,i)=>`<button class="answer-btn" style="background:linear-gradient(135deg,${cols[i]},${cols[i]}dd);" onclick="submitAnswer(${i})" id="ans-btn-${i}">${a}</button>`).join('');let tl=20;document.getElementById('timer-text').textContent=tl;document.getElementById('timer-fill').style.width='100%';clearInterval(timerInterval);timerInterval=setInterval(()=>{tl--;document.getElementById('timer-text').textContent=tl;document.getElementById('timer-fill').style.width=(tl/20*100)+'%';if(tl<=0){clearInterval(timerInterval);if(!answered)disableButtons();}},1000);});
function submitAnswer(i){if(answered)return;answered=true;socket.emit('group-answer',{answer:i,groupNum:groupNum});const btn=document.getElementById('ans-btn-'+i);btn.style.border='3px solid #ffd700';btn.style.transform='scale(1.05)';disableButtons();}
function disableButtons(){for(let i=0;i<4;i++){const b=document.getElementById('ans-btn-'+i);if(b)b.disabled=true;}}
socket.on('group-answer-result',(d)=>{document.getElementById('group-score').textContent=d.groupScore;document.getElementById('answer-feedback').innerHTML=d.correct?`<div class="feedback correct">✅ Correct!</div><div class="points-earned">+${d.points} pts</div>`:'<div class="feedback wrong">❌ Wrong!</div>';});
socket.on('group-results',(d)=>{clearInterval(timerInterval);document.getElementById('question-screen').style.display='none';document.getElementById('leaderboard-screen').style.display='block';const lb=document.getElementById('leaderboard-list'),rc=['gold','silver','bronze'],em=['🥇','🥈','🥉'];lb.innerHTML='<div style="text-align:center;padding:30px;"><div style="font-size:2.5em;animation:countPulse 0.8s infinite;">🧮</div><p class="waiting-text">Calculating...</p></div>';setTimeout(()=>{lb.innerHTML=d.leaderboard.map((g,i)=>`<div class="leaderboard-item"><span class="leaderboard-rank ${rc[i]||''}">${em[i]||`#${i+1}`}</span><span class="leaderboard-name">${g.name}</span><span class="leaderboard-score">${g.score} pts</span></div>`).join('');},2000);});
socket.on('group-ended',(d)=>{clearInterval(timerInterval);document.getElementById('question-screen').style.display='none';document.getElementById('leaderboard-screen').style.display='none';document.getElementById('gameover-screen').style.display='block';const lb=document.getElementById('final-leaderboard'),rc=['gold','silver','bronze'],em=['🥇','🥈','🥉'];lb.innerHTML=d.leaderboard.map((g,i)=>`<div class="leaderboard-item"><span class="leaderboard-rank ${rc[i]||''}">${em[i]||`#${i+1}`}</span><span class="leaderboard-name">${g.name}</span><span class="leaderboard-score">${g.score} pts</span></div>`).join('');});
socket.on('group-host-disconnected',()=>{document.body.innerHTML=`<div class="container" style="text-align:center;"><div class="glass-card"><h1 style="color:#e94560;">😢 Host Disconnected</h1><p style="color:#aaa;">The game host has left.</p><button class="btn btn-primary" onclick="location.reload()">🔄 Reconnect</button></div></div>`;});
</script>
</body>
</html>
