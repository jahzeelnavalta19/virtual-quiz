<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🎮 Game Mode - Player</title>
<link rel="stylesheet" href="style.css">
<style>.answer-btn{width:100%;min-height:70px;font-size:1.15em;}@media(max-width:600px){.answers-grid{grid-template-columns:1fr;}}.custom-row{margin-bottom:12px;}.custom-label{display:block;color:#aaa;font-weight:700;font-size:0.85em;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}.custom-options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}.custom-opt{font-size:2em;padding:8px 10px;border-radius:12px;cursor:pointer;border:2px solid transparent;background:rgba(255,255,255,0.05);transition:all 0.2s;min-width:45px;text-align:center;}.custom-opt:hover{background:rgba(255,255,255,0.15);transform:scale(1.1);}.custom-opt.selected{border:2px solid #ffd700!important;background:rgba(255,215,0,0.15)!important;box-shadow:0 0 12px rgba(255,215,0,0.3);}.color-opt{width:35px;height:35px;min-width:35px;border-radius:50%!important;padding:0;font-size:0;}.color-opt.selected{border:3px solid white!important;box-shadow:0 0 15px currentColor;}</style>
</head>
<body>
<canvas class="particles" id="particles"></canvas>
<div class="container">
<div id="join-screen"><h1>🎮 Game Mode</h1>
<div id="step-1" class="glass-card"><div class="input-group"><label style="display:block;margin-bottom:10px;color:#aaa;font-weight:700;">Game PIN</label><input type="text" id="pin-input" placeholder="____" maxlength="4" inputmode="numeric"></div><div class="input-group"><label style="display:block;margin-bottom:10px;color:#aaa;font-weight:700;">Nickname</label><input type="text" id="nickname-input" placeholder="Enter nickname" maxlength="15"></div><div id="join-error" style="color:#e94560;margin:10px 0;display:none;font-weight:700;"></div><button class="btn btn-primary" onclick="goToCharacter()">✨ Customize Character ➜</button></div>
<div id="step-2" class="glass-card" style="display:none;"><h3>🎨 Build Your Character</h3><div style="background:rgba(255,255,255,0.05);border-radius:20px;padding:20px;margin-bottom:20px;"><div id="character-preview" style="font-size:6em;min-height:140px;position:relative;display:flex;align-items:center;justify-content:center;"><div style="position:relative;width:130px;height:130px;"><span id="char-base" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1em;">😊</span><span id="char-hat" style="position:absolute;top:12%;left:50%;transform:translate(-50%,-50%);font-size:0.7em;"></span><span id="char-glasses" style="position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);font-size:0.75em;"></span><span id="char-extra" style="position:absolute;top:18%;left:78%;transform:translate(-50%,-50%);font-size:0.5em;"></span></div></div><p style="color:#aaa;margin-top:5px;font-size:0.9em;">Your Character</p></div>
<div class="custom-row"><label class="custom-label">Base</label><div class="custom-options" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;"><span class="custom-opt selected" data-part="base" data-value="😊">😊</span><span class="custom-opt" data-part="base" data-value="😢">😢</span><span class="custom-opt" data-part="base" data-value="😂">😂</span><span class="custom-opt" data-part="base" data-value="😡">😡</span><span class="custom-opt" data-part="base" data-value="😛">😛</span><span class="custom-opt" data-part="base" data-value="🤖">🤖</span><span class="custom-opt" data-part="base" data-value="👽">👽</span><span class="custom-opt" data-part="base" data-value="💀">💀</span><span class="custom-opt" data-part="base" data-value="🐵">🐵</span><span class="custom-opt" data-part="base" data-value="🐰">🐰</span><span class="custom-opt" data-part="base" data-value="🐻">🐻</span><span class="custom-opt" data-part="base" data-value="🐮">🐮</span><span class="custom-opt" data-part="base" data-value="🐸">🐸</span><span class="custom-opt" data-part="base" data-value="🐼">🐼</span><span class="custom-opt" data-part="base" data-value="🐷">🐷</span><span class="custom-opt" data-part="base" data-value="🐨">🐨</span></div></div>
<div class="custom-row"><label class="custom-label">Glasses</label><div class="custom-options"><span class="custom-opt selected" data-part="glasses" data-value="">❌</span><span class="custom-opt" data-part="glasses" data-value="👓">👓</span><span class="custom-opt" data-part="glasses" data-value="🕶️">🕶️</span><span class="custom-opt" data-part="glasses" data-value="🥽">🥽</span></div></div>
<div class="custom-row"><label class="custom-label">Hat</label><div class="custom-options"><span class="custom-opt selected" data-part="hat" data-value="">❌</span><span class="custom-opt" data-part="hat" data-value="🎩">🎩</span><span class="custom-opt" data-part="hat" data-value="🧢">🧢</span><span class="custom-opt" data-part="hat" data-value="👒">👒</span><span class="custom-opt" data-part="hat" data-value="🎓">🎓</span><span class="custom-opt" data-part="hat" data-value="👑">👑</span><span class="custom-opt" data-part="hat" data-value="🪖">🪖</span><span class="custom-opt" data-part="hat" data-value="⛑️">⛑️</span></div></div>
<div class="custom-row"><label class="custom-label">Extra</label><div class="custom-options"><span class="custom-opt selected" data-part="extra" data-value="">❌</span><span class="custom-opt" data-part="extra" data-value="✨">✨</span><span class="custom-opt" data-part="extra" data-value="💫">💫</span><span class="custom-opt" data-part="extra" data-value="🌟">🌟</span><span class="custom-opt" data-part="extra" data-value="🎀">🎀</span></div></div>
<div class="custom-row"><label class="custom-label">Name Color</label><div class="custom-options"><span class="custom-opt color-opt selected" data-part="color" data-value="#e94560" style="background:#e94560;"></span><span class="custom-opt color-opt" data-part="color" data-value="#f39c12" style="background:#f39c12;"></span><span class="custom-opt color-opt" data-part="color" data-value="#2ecc71" style="background:#2ecc71;"></span><span class="custom-opt color-opt" data-part="color" data-value="#3498db" style="background:#3498db;"></span><span class="custom-opt color-opt" data-part="color" data-value="#9b59b6" style="background:#9b59b6;"></span><span class="custom-opt color-opt" data-part="color" data-value="#1abc9c" style="background:#1abc9c;"></span><span class="custom-opt color-opt" data-part="color" data-value="#ff6b6b" style="background:#ff6b6b;"></span><span class="custom-opt color-opt" data-part="color" data-value="#ffd700" style="background:#ffd700;"></span></div></div>
<button class="btn btn-success" onclick="joinGame()">🎯 Join Game!</button><button class="btn" style="background:rgba(255,255,255,0.1);color:#aaa;font-size:0.9em;margin-top:5px;" onclick="goToStep1()">⬅ Back</button></div>
</div>
<div id="waiting-screen" style="display:none;"><div class="glass-card" style="text-align:center;"><h2>✅ You're In!</h2><div id="waiting-char" style="font-size:4em;margin:15px 0;"></div><p style="font-size:2em;font-weight:900;" id="my-nickname"></p><p class="waiting-text">Waiting for host to start...</p><p style="color:#aaa;margin-top:15px;">👀 Watch the big screen!</p></div></div>
<div id="question-screen" style="display:none;"><div style="color:#aaa;margin-bottom:5px;font-weight:700;">Question <span id="q-current">1</span> / 30</div><div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%;"></div></div><div class="timer-text" id="timer-text">20</div><div class="glass-card"><div class="question-text" id="question-text" style="font-size:1.3em;margin-bottom:20px;"></div><div class="answers-grid" id="answers-grid"></div><div id="answer-feedback" style="margin-top:20px;"></div><div class="score-display">⭐ Score: <span id="my-score">0</span> | 🔥 Streak: <span id="my-streak">0</span></div></div></div>
<div id="leaderboard-screen" style="display:none;"><h2>📊 Leaderboard</h2><div class="glass-card"><div class="leaderboard" id="leaderboard-list"></div></div><p class="waiting-text">Waiting for next question...</p></div>
<div id="gameover-screen" style="display:none;"><h1>🏆 Game Over!</h1><div class="glass-card"><div class="leaderboard" id="final-leaderboard"></div></div></div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const pts=[];for(let i=0;i<30;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,speed:Math.random()*0.4+0.15,opacity:Math.random()*0.3+0.1});function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.y-=p.speed;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.fill();});requestAnimationFrame(anim);}anim();
const AudioContext=window.AudioContext||window.webkitAudioContext;let audioCtx;function initAudio(){if(!audioCtx)audioCtx=new AudioContext();}function playBeep(f,d,t='sine',v=0.3){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}function playCorrect(){playBeep(523,0.12);setTimeout(()=>playBeep(659,0.12),120);setTimeout(()=>playBeep(784,0.25),240);}function playWrong(){playBeep(200,0.3,'sawtooth',0.2);}function playJoin(){playBeep(800,0.15,'sine',0.2);}function playDoubleSound(){playBeep(880,0.1,'square',0.3);setTimeout(()=>playBeep(1100,0.2,'square',0.4),100);}
let characterParts={base:'😊',glasses:'',hat:'',extra:''},selectedColor='#e94560';
function updatePreview(){document.getElementById('char-base').textContent=characterParts.base||'😊';document.getElementById('char-hat').textContent=characterParts.hat||'';document.getElementById('char-glasses').textContent=characterParts.glasses||'';document.getElementById('char-extra').textContent=characterParts.extra||'';}
function getCharacterString(){return[characterParts.hat,characterParts.glasses,characterParts.base,characterParts.extra].filter(p=>p!=='').join('');}
function goToCharacter(){const p=document.getElementById('pin-input').value.trim(),n=document.getElementById('nickname-input').value.trim();if(!p||p.length!==4){document.getElementById('join-error').textContent='Enter a 4-digit PIN!';document.getElementById('join-error').style.display='block';return;}if(!n){document.getElementById('join-error').textContent='Enter a nickname!';document.getElementById('join-error').style.display='block';return;}document.getElementById('join-error').style.display='none';document.getElementById('step-1').style.display='none';document.getElementById('step-2').style.display='block';}
function goToStep1(){document.getElementById('step-2').style.display='none';document.getElementById('step-1').style.display='block';}
document.addEventListener('click',function(e){if(e.target.classList.contains('custom-opt')||e.target.classList.contains('color-opt')){const part=e.target.dataset.part,value=e.target.dataset.value,parent=e.target.parentElement;parent.querySelectorAll('.custom-opt,.color-opt').forEach(el=>{el.classList.remove('selected');if(el.classList.contains('color-opt'))el.style.border='2px solid transparent';});e.target.classList.add('selected');if(e.target.classList.contains('color-opt'))e.target.style.border='3px solid white';if(part==='color')selectedColor=value;else{characterParts[part]=value;updatePreview();}}});
const socket=io();let myScore=0,myStreak=0,timerInterval=null,answered=false;
function joinGame(){initAudio();const pin=document.getElementById('pin-input').value.trim(),nickname=document.getElementById('nickname-input').value.trim()||'Player';if(!pin||pin.length!==4){document.getElementById('join-error').textContent='Enter a 4-digit PIN!';document.getElementById('join-error').style.display='block';return;}socket.emit('kahoot-join',{pin,nickname,character:getCharacterString(),color:selectedColor});}
socket.on('kahoot-join-success',(d)=>{playJoin();document.getElementById('join-screen').style.display='none';document.getElementById('waiting-screen').style.display='none';document.getElementById('my-nickname').textContent=d.nickname;document.getElementById('my-nickname').style.color=selectedColor;document.getElementById('waiting-char').textContent=getCharacterString();if(!d.reconnect){document.getElementById('waiting-screen').style.display='block';}});
socket.on('kahoot-join-error',(d)=>{document.getElementById('join-error').textContent=d.message;document.getElementById('join-error').style.display='block';});
socket.on('kahoot-double-active',()=>{playDoubleSound();document.getElementById('answer-feedback').innerHTML='<div class="feedback" style="color:#ffd700;font-size:1.8em;">⚡ DOUBLE POINTS! ⚡</div>';setTimeout(()=>{if(document.getElementById('answer-feedback').innerHTML.includes('DOUBLE'))document.getElementById('answer-feedback').innerHTML='';},3000);});
socket.on('kahoot-started',()=>{document.getElementById('waiting-screen').style.display='none';});
socket.on('kahoot-question',(d)=>{answered=false;document.getElementById('leaderboard-screen').style.display='none';document.getElementById('gameover-screen').style.display='none';document.getElementById('question-screen').style.display='block';document.getElementById('q-current').textContent=d.questionNumber;document.getElementById('question-text').textContent=d.questionText;document.getElementById('answer-feedback').innerHTML='';const grid=document.getElementById('answers-grid'),cols=['#e94560','#0f3460','#533483','#00b894'];grid.innerHTML=d.answers.map((a,i)=>`<button class="answer-btn" style="background:linear-gradient(135deg,${cols[i]},${cols[i]}dd);" onclick="submitAnswer(${i})" id="ans-btn-${i}">${a}</button>`).join('');let tl=20;document.getElementById('timer-text').textContent=tl;document.getElementById('timer-fill').style.width='100%';document.getElementById('timer-fill').classList.remove('urgent');document.getElementById('timer-text').classList.remove('urgent');clearInterval(timerInterval);timerInterval=setInterval(()=>{tl--;document.getElementById('timer-text').textContent=tl;document.getElementById('timer-fill').style.width=(tl/20*100)+'%';if(tl<=5){document.getElementById('timer-fill').classList.add('urgent');document.getElementById('timer-text').classList.add('urgent');}if(tl<=0){clearInterval(timerInterval);if(!answered)disableButtons();}},1000);});
function submitAnswer(i){if(answered)return;answered=true;socket.emit('kahoot-answer',{answer:i});const btn=document.getElementById('ans-btn-'+i);btn.style.border='3px solid #ffd700';btn.style.transform='scale(1.05)';disableButtons();}
function disableButtons(){for(let i=0;i<4;i++){const b=document.getElementById('ans-btn-'+i);if(b)b.disabled=true;}}
socket.on('kahoot-answer-result',(d)=>{myScore=d.totalScore;myStreak=d.streak;document.getElementById('my-score').textContent=myScore;document.getElementById('my-streak').textContent=myStreak;if(d.correct)playCorrect();else playWrong();let pt='+'+d.points+' points';if(d.double)pt+=' ⚡x2';document.getElementById('answer-feedback').innerHTML=d.correct?`<div class="feedback correct">✅ Correct!</div><div class="points-earned">${pt}</div>`:'<div class="feedback wrong">❌ Wrong!</div>';});
socket.on('kahoot-results',(d)=>{clearInterval(timerInterval);document.getElementById('question-screen').style.display='none';document.getElementById('leaderboard-screen').style.display='block';const lb=document.getElementById('leaderboard-list'),rc=['gold','silver','bronze'];lb.innerHTML='<div style="text-align:center;padding:30px;"><div style="font-size:2.5em;animation:countPulse 0.8s infinite;">🧮</div><p class="waiting-text">Calculating scores...</p></div>';setTimeout(()=>{lb.innerHTML='';d.leaderboard.forEach((p,i)=>{setTimeout(()=>{const item=document.createElement('div');item.className='leaderboard-item';item.innerHTML=`<span class="leaderboard-rank ${rc[i]||''}">#${i+1}</span><span class="leaderboard-name">${p.nickname}</span><span class="leaderboard-score">${p.score} pts</span>`;lb.appendChild(item);},i*800);});},2000);});
socket.on('kahoot-ended',(d)=>{clearInterval(timerInterval);document.getElementById('question-screen').style.display='none';document.getElementById('leaderboard-screen').style.display='none';document.getElementById('gameover-screen').style.display='block';const lb=document.getElementById('final-leaderboard'),rc=['gold','silver','bronze'],em=['🥇','🥈','🥉'];lb.innerHTML=d.leaderboard.map((p,i)=>`<div class="leaderboard-item"><span class="leaderboard-rank ${rc[i]||''}">${em[i]||`#${i+1}`}</span><span class="leaderboard-name">${p.nickname}</span><span class="leaderboard-score">${p.score} pts</span></div>`).join('');});
socket.on('kahoot-host-disconnected',()=>{document.body.innerHTML=`<div class="container" style="text-align:center;"><div class="glass-card"><h1 style="color:#e94560;">😢 Host Disconnected</h1><p style="color:#aaa;">The game host has left.</p><button class="btn btn-primary" onclick="location.reload()">🔄 Reconnect</button></div></div>`;});
</script>
</body>
</html>
